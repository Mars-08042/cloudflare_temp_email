name: Deploy Multi Cloudflare

on:
  workflow_dispatch:
    inputs:
      target:
        description: "选择要部署的 Cloudflare 环境"
        required: true
        default: "cf-marsky"
        type: choice
        options:
          - cf-marsky
          - cf-marslume
          - cf-forforever
          - all

jobs:
  deploy-marslume:
    if: ${{ inputs.target == 'all' || inputs.target == 'cf-marslume' }}
    runs-on: ubuntu-latest
    environment:
      name: cf-marslume
      url: https://mail.marslume.com
    concurrency:
      group: deploy-cf-marslume
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Deploy cf-marslume
        run: |
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}

          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}

          cd worker/
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          pnpm install --no-frozen-lockfile

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi

          if [ "$debug_mode" = "true" ]; then
            pnpm run deploy
          else
            if pnpm run deploy >/dev/null 2>&1; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              exit "$code"
            fi
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}

  deploy-forforever:
    if: ${{ inputs.target == 'all' || inputs.target == 'cf-forforever' }}
    runs-on: ubuntu-latest
    environment:
      name: cf-forforever
      url: https://mail.forforever.cc
    concurrency:
      group: deploy-cf-forforever
      cancel-in-progress: false
    permissions:
